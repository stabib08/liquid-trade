schema_version: 1
id: onshoring_semis
name: Onshoring Semis
version: 2026.07.05
created: 2026-07-05

thesis: >
  Export controls plus capex reshoring shift value toward the "picks and shovels"
  of the semiconductor supply chain — the fab-equipment makers and the leading-edge
  foundry — and away from fabless designers whose end demand is more cyclical and
  more exposed to policy-driven market access. Owning the toll road (litho + WFE +
  foundry capacity) should out-earn owning any single chip design through a capex
  super-cycle.

falsifiable_prediction: >
  The basket shows positive event-driven excess return, beyond its SOXX beta, in
  the [-1, +3] trading-day window around capex-guide and export-policy announcements
  (event study, Phase 3). Absent events, it need not beat SOXX.

kill_criterion: >
  If daily returns are fully explained by SOXX beta (R^2 high, event-window abnormal
  return indistinguishable from 0 across the catalog of policy/capex events), there
  is no onshoring-specific edge — the basket is a more expensive way to hold SOXX.

constituents: [TSM, ASML, AMAT]
weighting_scheme: market_cap_snapshot
rebalance: monthly

primary_benchmark: SOXX
natural_comparator: SOXX

factor_tickers: [SPY, SOXX, SMH]

# TSM is tradeable on Liquid (equity perp) and appeared with positioning notional;
# ASML/AMAT did not resolve in the probe. We capture what exists, skip the rest.
positioning_symbols: [TSM]

notes: >
  Concentration caveat: under market-cap weighting TSM + ASML will dominate the
  sleeve; AMAT's WFE signal may be swamped. Report the effective number of names
  (inverse Herfindahl of weights) so the reader knows how concentrated the bet is.
